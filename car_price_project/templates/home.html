{% extends 'base.html' %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/animation.css') }}">

<div id="home-animation" class="f1-scene">
    <!-- Racetrack Background -->
    <div class="track-bg"></div>

    <!-- Canvas for Skid marks and Smoke -->
    <canvas id="fxCanvas"></canvas>

    <!-- F1 Car Container -->
    <div class="f1-car-container" id="f1Car">
        <!-- SVG of a Red Formula 1 Car (Top Down Perspective) -->
        <svg class="f1-car-svg" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Shadow under car -->
            <ellipse cx="200" cy="100" rx="190" ry="70" fill="rgba(0,0,0,0.5)" filter="blur(5px)"/>
            
            <!-- Rear Wing -->
            <rect x="10" y="50" width="30" height="100" fill="#111" rx="5"/>
            <rect x="5" y="60" width="40" height="80" fill="#900"/>
            
            <!-- Rear Wheels -->
            <rect x="50" y="10" width="45" height="40" fill="#222" rx="5"/> <!-- Left -->
            <rect x="50" y="150" width="45" height="40" fill="#222" rx="5"/> <!-- Right -->
            
            <!-- Main Body -->
            <path d="M40 80 Q 200 40, 300 80 L 370 90 L 370 110 L 300 120 Q 200 160, 40 120 Z" fill="#c00"/>
            <path d="M60 85 Q 200 65, 290 85 L 350 95 L 350 105 L 290 115 Q 200 135, 60 115 Z" fill="#f00"/>
            
            <!-- Engine Cover / Exhaust area -->
            <rect x="40" y="85" width="100" height="30" fill="#222" rx="5"/>
            <circle cx="45" cy="100" r="15" fill="#555"/>
            <!-- Glowing Exhaust -->
            <circle cx="45" cy="100" r="8" fill="#ff5500" class="exhaust-glow" opacity="0.8"/>
            
            <!-- Cockpit / Driver -->
            <ellipse cx="180" cy="100" rx="25" ry="15" fill="#111"/>
            <circle cx="185" cy="100" r="10" fill="#00f"/> <!-- Helmet -->
            
            <!-- Front Wheels -->
            <rect x="290" y="20" width="40" height="30" fill="#222" rx="5"/> <!-- Left -->
            <rect x="290" y="150" width="40" height="30" fill="#222" rx="5"/> <!-- Right -->

            <!-- Suspension -->
            <line x1="150" y1="100" x2="310" y2="35" stroke="#333" stroke-width="4"/>
            <line x1="150" y1="100" x2="310" y2="165" stroke="#333" stroke-width="4"/>
            
            <!-- Front Wing -->
            <path d="M340 50 Q 370 50, 390 70 L 390 130 Q 370 150, 340 150 Z" fill="#900"/>
            <path d="M345 60 Q 365 60, 380 75 L 380 125 Q 365 140, 345 140 Z" fill="#111"/>

            <!-- Braking lights (hidden initially) -->
            <rect x="5" y="95" width="5" height="10" fill="#ff0000" class="brake-light" opacity="0"/>
        </svg>
    </div>

    <!-- Overlay Text & Buttons (Hidden until end of animation) -->
    <div class="hero-overlay" id="heroOverlay">
        <h1 class="f1-title text-center text-dark">AI Car Price Prediction</h1>
        <p class="f1-subtitle text-center">Find the true value of any car instantly.</p>
        <div class="f1-buttons">
            <a href="/cars" class="f1-btn btn-enter">Enter Garage</a>
            <a href="/predict" class="f1-btn btn-predict">Predict Car Price</a>
        </div>
    </div>
</div>

<!-- Load GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="{{ url_for('static', filename='js/animation.js') }}"></script>

<!-- Hide generic base.html navbar/background during animation or override layout -->
<script>
    document.querySelector('.garage-background').style.display = 'none';
    document.querySelector('.navbar').style.display = 'none';
    document.body.style.background = '#f5f5f5'; // White theme for track
    
    // Once animation finishes or user starts navigating, we can bring navbar back.
</script>
{% endblock %}
